<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Jihye — 사용자 경험을 중심으로 생각하는 프론트엔드 개발자 포트폴리오">
  <meta name="keywords" content="Frontend Developer, React, TypeScript, Portfolio, 프론트엔드 개발자">
  <meta name="author" content="Jihye">
  <meta property="og:title" content="Jihye — Frontend Developer">
  <meta property="og:description" content="사용자 경험을 중심으로 생각하며, 깔끔하고 직관적인 인터페이스를 만드는 프론트엔드 개발자입니다.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Jihye — Frontend Developer">
  <meta name="twitter:description" content="사용자 경험을 중심으로 생각하며, 깔끔하고 직관적인 인터페이스를 만드는 프론트엔드 개발자입니다.">
  <meta name="theme-color" content="#f5a68c" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a0a2e" media="(prefers-color-scheme: dark)">
  <title>Jihye — Frontend Developer</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Pretendard -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <!-- Galmuri11 (한국어 레트로 픽셀 폰트) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👾</text></svg>">

  <!-- Inline theme initialization to prevent FOUC -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme-preference');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/app/main.tsx"></script>
</body>
</html>
